<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Secure Payment</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="#">About us</a>
            <a href="#">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="payment-container">
            <h2>Enter Payment Details</h2>

            <h3>Total Price: £<span id="paymentTotal">0.00</span></h3>
            
            <form id="paymentForm">
                <label for="cardNumber">MasterCard Number</label>
                <input type="text" id="cardNumber" placeholder="5222123456781234">

                <label for="expMonth">Expiry Month</label>
                <input type="text" id="expMonth" placeholder="11" min="1" max="12">

                <label for="expYear">Expiry Year</label>
                <input type="number" id="expYear" placeHolder="2027">

                <label for="cvv">Security Code</label>
                <input type="text" id="cvv" placeholder="089">

                <p id="errorMessage"></p>

                <button type="submit">Continue</button>
            </form>
        </section>
    </main>

    <script src="js/script.js"></script>
    </body>
    </html>
